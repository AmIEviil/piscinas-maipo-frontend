name: Deploy Frontend

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin
            echo "Conectado al servidor. Iniciando despliegue de Frontend..."

            # Asegurar permisos y dueño
            chown -R root:root /opt/piscinas/frontend
            chmod -R 755 /opt/piscinas/frontend
            
            # Autorizar directorio en Git
            git config --global --add safe.directory /opt/piscinas/frontend || true

            cd /opt/piscinas/frontend
            git fetch origin
            git reset --hard origin/main
            
            cd /opt/piscinas
            echo "Reconstruyendo frontend (esto puede tardar)..."
            docker-compose build --no-cache frontend
            docker-compose up -d frontend
            docker image prune -f
            echo "Despliegue finalizado con éxito."
